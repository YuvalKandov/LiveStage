# Authoritative definition of the TripDemo Xcode project (build spec §3, §7).
# The generated TripDemo.xcodeproj is committed for convenience - regenerate after any change
# to this file (`xcodegen generate --spec ios-demo/project.yml`) and confirm no unexpected diff.
name: TripDemo

options:
  bundleIdPrefix: com.livestage
  deploymentTarget:
    iOS: "16.2"
  createIntermediateGroups: true

packages:
  LiveStage:
    path: ../swift/LiveStage

# Shared schemes so destinations/builds are reproducible (not per-user autogenerated).
schemes:
  TripDemo:
    build:
      targets:
        TripDemo: all
        TripDemoWidget: all      # build the widget too, so its previews resolve under this scheme
    run:
      config: Debug
    test:
      config: Debug
  TripDemoWidget:
    build:
      targets:
        TripDemoWidget: all
    run:
      config: Debug

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"        # iPhone
    CODE_SIGN_STYLE: Automatic         # device builds: let Xcode manage profiles
    # Simulator needs no signing (keeps the CLI build team-free); device uses automatic signing.
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
    # To run on a physical iPhone, set your 10-char Apple Developer Team ID here (or pick the team
    # in Xcode ▸ each target ▸ Signing & Capabilities). Blank = Xcode will prompt you to choose.
    DEVELOPMENT_TEAM: ""

targets:
  TripDemo:
    type: application
    platform: iOS
    sources:
      - TripDemo
    # Local-dev secrets (the seeded mobile key + backend host) are injected from an uncommitted
    # xcconfig (build spec §12: the mobile key is not a true secret, but we still keep it out of
    # version control). Copy DevelopmentSecrets.xcconfig.example -> DevelopmentSecrets.xcconfig.
    configFiles:
      Debug: DevelopmentSecrets.xcconfig
      Release: DevelopmentSecrets.xcconfig
    info:
      path: TripDemo/Info.plist
      properties:
        CFBundleDisplayName: TripTogether
        NSSupportsLiveActivities: true            # required to host Live Activities (build spec §2, §7)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: com.livestage.tripdemo
            CFBundleURLSchemes: [triptogether]     # deep-link scheme (build spec §11)
        # Allow plain-HTTP to the local backend on the simulator (build spec §12: HTTPS in any
        # non-local deployment). NSAllowsLocalNetworking covers localhost without a blanket exception.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Surfaced from the xcconfig build settings so the app can read them at runtime. The base URL
        # is built in code as http://<host> (xcconfig can't hold "//", so only the host is injected).
        LiveStageAPIKey: $(LIVESTAGE_API_KEY)
        LiveStageAPIHost: $(LIVESTAGE_API_HOST)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.livestage.tripdemo
    dependencies:
      - package: LiveStage
        product: LiveStageModels
      - package: LiveStage
        product: LiveStage                         # the SDK: configure/start/update/end/...
      - target: TripDemoWidget                     # embed the extension into the app

  TripDemoWidget:
    type: app-extension
    platform: iOS
    sources:
      - TripDemoWidget
    info:
      path: TripDemoWidget/Info.plist
      properties:
        CFBundleDisplayName: TripDemoWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.livestage.tripdemo.TripDemoWidget
    dependencies:
      - package: LiveStage
        product: LiveStageModels
      - package: LiveStage
        product: LiveStageUI
